<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A2238">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fight Camp">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Fight Camp · Aug 9</title>
<style>
  :root { --navy:#1A2238; --red:#C8102E; --canvas:#F5F1E8; --card:#FFFDF7; --line:#D8D0BE; --muted:#6B7280; --gold:#B8860B; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { -webkit-text-size-adjust:100%; }
  body { margin:0; background:var(--canvas); color:var(--navy); font-family:'Helvetica Neue',Arial,sans-serif; overflow-x:hidden; padding-bottom:env(safe-area-inset-bottom); }
  header { background:var(--navy); color:var(--canvas); padding:calc(12px + env(safe-area-inset-top)) 16px 12px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; position:sticky; top:0; z-index:20; }
  h1 { font-family:'Arial Black',sans-serif; font-size:20px; letter-spacing:1px; text-transform:uppercase; margin:0; }
  .count { text-align:center; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); border-radius:12px; padding:7px 14px; min-width:78px; }
  .count b { font-size:28px; color:#fff; font-family:Georgia,serif; line-height:1; display:block; }
  .count span { font-size:9px; letter-spacing:1.2px; display:block; color:#B9B3A4; margin-top:3px; }
  .count .fightbar { height:3px; background:rgba(255,255,255,.15); border-radius:2px; margin-top:6px; overflow:hidden; }
  .count .fightbar div { height:100%; background:var(--red); }
  .round { background:var(--red); padding:3px 10px; font-weight:900; letter-spacing:1.5px; font-size:10px; border-radius:3px; }
  nav { display:flex; border-bottom:3px solid var(--navy); background:#EDE7DA; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; position:sticky; top:calc(60px + env(safe-area-inset-top)); z-index:19; }
  nav::-webkit-scrollbar{display:none;}
  nav button { padding:14px 16px; cursor:pointer; font-weight:800; font-size:12px; letter-spacing:1.2px; text-transform:uppercase; background:transparent; color:var(--navy); border:none; white-space:nowrap; min-height:44px; }
  nav button.active { background:var(--navy); color:var(--canvas); }
  main { padding:14px; padding-bottom:calc(24px + env(safe-area-inset-bottom)); max-width:760px; margin:0 auto; width:100%; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:12px; max-width:100%; overflow-x:auto; }
  .label { font-weight:900; letter-spacing:1.5px; font-size:12px; margin-bottom:10px; color:var(--red); }
  .btn { background:var(--red); color:#fff; border:none; border-radius:6px; padding:13px 18px; font-weight:800; letter-spacing:.5px; cursor:pointer; text-transform:uppercase; font-size:13px; min-height:44px; touch-action:manipulation; }
  .btn.ghost { background:transparent; color:var(--navy); border:2px solid var(--navy); }
  .btn.sm { padding:9px 14px; font-size:11px; min-height:38px; }
  .item { display:flex; gap:12px; align-items:flex-start; padding:11px 4px; border-bottom:1px solid #EDE7DA; cursor:pointer; font-size:15px; line-height:1.5; min-height:44px; touch-action:manipulation; }
  .item input { width:22px; height:22px; accent-color:var(--red); margin-top:1px; flex-shrink:0; }
  .item.done span { text-decoration:line-through; opacity:.5; }
  .slot { font-weight:900; font-size:12px; letter-spacing:1px; background:#EDE7DA; padding:5px 10px; border-radius:4px; display:inline-block; margin:14px 0 4px; }
  .warn { border-left:6px solid var(--red); font-weight:700; color:var(--red); }
  input,select { padding:12px 10px; border:2px solid var(--navy); border-radius:6px; background:var(--card); font-size:16px; width:100%; min-height:44px; }
  input[type=range]{ padding:0; border:none; min-height:32px; accent-color:var(--red); }
  .muted { color:var(--muted); font-size:13px; }
  table { width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed; }
  td,th { padding:8px 4px; border-bottom:1px solid #EDE7DA; text-align:left; vertical-align:top; word-break:break-word; }
  th { width:52px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { border:2px solid var(--navy); background:var(--card); border-radius:6px; padding:10px 12px; font-weight:700; font-size:13px; cursor:pointer; user-select:none; touch-action:manipulation; min-height:44px; }
  .chip:active { background:var(--navy); color:#fff; }
  .chip .chipdel{ margin-left:4px; color:var(--red); font-weight:900; padding:2px 5px; }
  .exphoto{ width:150px; max-width:45%; border-radius:8px; flex-shrink:0; background:#EDE7DA; }
  .chip.on { background:var(--navy); color:#fff; }
  .rings { display:flex; justify-content:space-around; flex-wrap:wrap; gap:10px; }
  .bars { display:flex; align-items:flex-end; gap:5px; height:110px; margin-top:8px; padding-bottom:20px; }
  .bar { flex:1; background:#E8E2D6; position:relative; display:flex; flex-direction:column; justify-content:flex-end; min-width:0; }
  .bar .fill { background:var(--red); width:100%; transition:height .4s; }
  .bar .lbl { position:absolute; bottom:-18px; width:100%; text-align:center; font-size:9px; color:var(--muted); left:0; }
  .meal-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #EDE7DA; font-size:14px; gap:8px; min-height:44px; }
  .del { color:var(--red); cursor:pointer; font-weight:900; padding:8px; min-width:32px; text-align:center; }
  .streaks { display:flex; gap:10px; flex-wrap:wrap; }
  .streak-pill { flex:1; min-width:130px; background:var(--navy); color:#fff; border-radius:8px; padding:12px 14px; text-align:center; }
  .streak-pill b { font-size:26px; font-family:Georgia,serif; display:block; }
  .streak-pill span { font-size:10px; letter-spacing:1px; color:#B9B3A4; text-transform:uppercase; }
  .streak-pill.fire b::after { content:" 🔥"; }
  .offline-banner { background:var(--gold); color:#fff; text-align:center; padding:8px; font-size:12px; font-weight:700; display:none; }
  .offline-banner.show { display:block; }
  .wo-block { margin-top:14px; }
  .wo-block .bh { font-weight:900; letter-spacing:1px; font-size:11px; color:var(--muted); text-transform:uppercase; border-bottom:2px solid var(--navy); padding-bottom:4px; margin-bottom:4px; display:flex; justify-content:space-between; }
  .wo-ex { border-bottom:1px solid #EDE7DA; }
  .wo-ex .exhead { display:flex; justify-content:space-between; align-items:center; padding:10px 0; cursor:pointer; min-height:44px; gap:8px; touch-action:manipulation; }
  .wo-ex .caret { color:var(--red); font-weight:900; transition:transform .25s; flex-shrink:0; }
  .wo-ex.open .caret { transform:rotate(90deg); }
  .exdrop { max-height:0; overflow:hidden; transition:max-height .35s ease; }
  .wo-ex.open .exdrop { max-height:420px; }
  .exdrop-inner { display:flex; gap:14px; align-items:flex-start; padding:4px 0 14px; flex-wrap:wrap; }
  .exanim { background:#EDE7DA; border-radius:8px; flex-shrink:0; }
  .excues { flex:1; min-width:170px; font-size:13px; line-height:1.6; }
  .excues .mst { color:var(--red); font-weight:700; margin-top:6px; }
  .fA { animation: flipA 1.4s steps(1) infinite; }
  .fB { animation: flipB 1.4s steps(1) infinite; }
  .wo-ex:not(.open) .fA, .wo-ex:not(.open) .fB { animation:none; } /* don't burn CPU animating collapsed tutorials */
  @keyframes flipA { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }
  @keyframes flipB { 0%,50%{opacity:0} 50.01%,100%{opacity:1} }
  @media (max-width:400px){ .count{min-width:70px;padding:6px 10px;} .count b{font-size:24px;} h1{font-size:17px;} nav button{padding:13px 12px;font-size:11px;} }
  body.widget-mode header, body.widget-mode nav { display:none !important; }
  body.widget-mode main { max-width:100%; padding:0; }
  .widget-wrap { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; }
  .widget-wrap h2 { font-family:'Arial Black',sans-serif; letter-spacing:1px; text-transform:uppercase; font-size:16px; margin:0 0 4px; color:var(--red); }
  .widget-wrap .wdate { color:var(--muted); font-size:12px; margin-bottom:18px; }
  .widget-wrap .rings { margin-bottom:18px; }
  .widget-tap { margin-top:16px; font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
</style>
</head>
<body>
<header>
  <div><h1>Fight Camp</h1><span class="round" id="roundLbl">PRE-CAMP RAMP</span></div>
  <div class="count"><b id="countdown">30</b><span id="cdLbl">DAYS · AUG 9</span><div class="fightbar"><div id="cdBar" style="width:6.25%"></div></div></div>
</header>
<nav>
  <button data-tab="today" class="active">Today</button>
  <button data-tab="workout">Workout</button>
  <button data-tab="food">Food</button>
  <button data-tab="plan">Plan</button>
  <button data-tab="rounds">Rounds</button>
  <button data-tab="sleep">Sleep</button>
  <button data-tab="checkin">Check-in</button>
</nav>
<main>
  <div id="today"></div>
  <div id="workout" style="display:none"></div>
  <div id="food" style="display:none"></div>
  <div id="plan" style="display:none"></div>
  <div id="rounds" style="display:none"></div>
  <div id="sleep" style="display:none"></div>
  <div id="checkin" style="display:none"></div>
</main>

<script>
// ================= CONSTANTS =================
const FIGHT = new Date("2026-08-09T00:00:00");
const CAMP_START = new Date("2026-07-13T00:00:00");
const KCAL_T = 2850, PRO_T = 100;
const LS = "fightcamp-v3";
const LS_PENDING = LS+"-pending";

const FOODS = [
 {n:"Salmon nigiri (1pc)",k:65,p:4},
 {n:"Salmon fillet (6oz)",k:350,p:34},
 {n:"Tuna (1 can)",k:120,p:26},
 {n:"Chicken breast (6oz)",k:280,p:52},
 {n:"White rice (1 cup)",k:205,p:4},
 {n:"Pasta w/ sauce (2 cups)",k:440,p:16},
 {n:"Bread (2 slices)",k:160,p:6},
 {n:"Cheese (1oz)",k:110,p:7},
 {n:"Edamame (1 cup)",k:190,p:18},
 {n:"Peas/corn (1 cup)",k:120,p:5},
 {n:"Banana",k:105,p:1},
 {n:"Apple/fruit serving",k:90,p:0},
 {n:"Strawberry-banana smoothie",k:250,p:10},
 {n:"Protein shake (1 scoop)",k:150,p:25},
 {n:"NKED weight gainer (CHECK LABEL)",k:600,p:30},
];

const GH=()=>({tok:localStorage.getItem("fc-gh-token"),gid:localStorage.getItem("fc-gist-id")});
const SYNC=()=>{const g=GH();return !!(g.tok&&g.gid);};
const DEFAULTS={ done:{}, meals:{}, weekly:[], rounds:[], customFoods:[],
  notifTimes:{ morning:"09:00", boxing:"15:30", postbox:"17:05", gym:"18:30", sleep:"21:15" },
  notifsOn:false, hiddenFoods:[], coach:{} };
let D=null;
try{ D=JSON.parse(localStorage.getItem(LS)||"null"); }catch(e){ D=null; } // corrupt data can't blank the app anymore
D=Object.assign({},DEFAULTS,(D&&typeof D==="object")?D:{});
D.notifTimes=Object.assign({},DEFAULTS.notifTimes,D.notifTimes||{});
["weekly","rounds","customFoods","hiddenFoods"].forEach(k=>{ if(!Array.isArray(D[k]))D[k]=[]; });
["done","meals","coach"].forEach(k=>{ if(!D[k]||typeof D[k]!=="object")D[k]={}; });

// ============== CLOUD SYNC (GitHub Gist) ==============
async function ghApi(path,method,body){
  const {tok}=GH();
  const r=await fetch("https://api.github.com"+path,{method:method||"GET",
    headers:{Authorization:"Bearer "+tok,Accept:"application/vnd.github+json"},
    body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error("GitHub error "+r.status+(r.status===401?" — token invalid or expired":""));
  return r.json();
}
async function cloudPull(){
  const j=await ghApi("/gists/"+GH().gid);
  const f=j.files&&j.files["fightcamp.json"];
  if(!f)return null;
  let txt=f.content;
  if(f.truncated) txt=await (await fetch(f.raw_url)).text();
  return JSON.parse(txt);
}
async function cloudPush(){
  await ghApi("/gists/"+GH().gid,"PATCH",{files:{"fightcamp.json":{content:JSON.stringify(D)}}});
}
function setSyncStatus(t){const el=document.getElementById("syncMsg");if(el)el.textContent=t;}
let pushTimer=null;
function queuePush(){
  if(!SYNC())return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>cloudPush()
    .then(()=>setSyncStatus("Auto-synced ✓ "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})))
    .catch(e=>setSyncStatus("✗ "+e.message)),1500);
}
async function connectSync(){
  const tok=(document.getElementById("ghTok").value||"").trim();
  if(!tok)return alert("Paste your GitHub token first");
  localStorage.setItem("fc-gh-token",tok);
  try{
    const list=await ghApi("/gists");
    let g=list.find(x=>x.description==="fight-camp-data");
    if(!g) g=await ghApi("/gists","POST",{description:"fight-camp-data",public:false,files:{"fightcamp.json":{content:JSON.stringify(D)}}});
    localStorage.setItem("fc-gist-id",g.id);
    renderCheckin();
    await forceSync();
  }catch(e){ localStorage.removeItem("fc-gh-token"); setSyncStatus("✗ "+e.message); alert("Couldn't connect: "+e.message); }
}
function disconnectSync(){ if(!confirm("Disconnect sync on this device? (Cloud data stays safe)"))return; localStorage.removeItem("fc-gh-token"); localStorage.removeItem("fc-gist-id"); renderCheckin(); }
async function forceSync(){
  if(!SYNC()){ setSyncStatus("Not connected — paste your token above and hit Connect."); return; }
  setSyncStatus("Syncing…");
  try{
    const remote=await cloudPull();
    if(remote&&remote._saved&&(!D._saved||remote._saved>D._saved)){
      D=remote; localStorage.setItem(LS,JSON.stringify(D)); render();
      setSyncStatus("Pulled newer data from cloud ✓");
    }else{
      await cloudPush(); setSyncStatus("Pushed this device's data to cloud ✓");
    }
  }catch(e){ setSyncStatus("✗ "+e.message); }
}
const save=()=>{
  D._saved=Date.now();
  localStorage.setItem(LS,JSON.stringify(D));
  queuePush();
};
let __day=null;
setInterval(()=>{ if(__day && today()!==__day && typeof render==="function") render(); __day=today(); },30000);

const fmtDate=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const today=()=>fmtDate(new Date()); // LOCAL time — v8 used UTC, which logged evening entries on tomorrow's date

// ============== SCHEDULE ==============
const MORNING = ["Neck 4-way isometric 3x15s each","Jump rope easy 3x2min","Plank + side plank 2x30s each","Mobility hips/shoulders/ankles 5min"];
const PLAN = {
 0:{label:"PRE-CAMP RAMP",days:{1:{m:MORNING,b:true,g:["Easy machine circuit: leg press 2x10, chest press 2x10, lat pulldown 2x10, light — grooving form for Wk1"]},2:{m:MORNING,b:true,g:["Rowing machine easy 15min + core 10min"]},3:{m:MORNING,b:true,g:["Cable chops both dir 3x8/side light, assisted pull-up 3x8, sit-ups 3x15"]},4:{m:MORNING,b:true,g:["Easy machine circuit repeat"]},5:{m:["Rest"],b:false,g:["4 rounds x 3min shadowbox/row easy"]},6:{m:["Rest"],b:false,g:["Treadmill Zone 2 25min"]},0:{m:["FULL REST. Check-in."],b:false,g:[]}}},
 1:{label:"WEEK 1 · BASE",days:{
  1:{m:MORNING,b:true,g:["Leg press 3x8 (RPE 6-7)","Seated leg curl 3x10","Leg extension 3x10","Calf raise machine 3x12","Box jump 4x3 full rest","Plank 3x30s"]},
  2:{m:MORNING,b:true,g:["Chest press machine 3x6","Lat pulldown 3x6","Seated cable row 3x8","Cable chop hi→lo 3x8/side","Cable chop lo→hi 3x8/side","Cable external rotation 2x15/side"]},
  3:{m:["Jump rope intervals 6x1min hard/1min easy","Agility footwork 10min","Push-ups 3x max-2"],b:true,g:["Rowing intervals 6x1min hard/1min easy","Back extension machine 3x12","Hanging knee raise 3x10 + plank 2x45s"]},
  4:{m:MORNING,b:true,g:["Shoulder press machine 3x6","Assisted pull-up 3x8","Pec deck rear delt 2x15","Cable chops 3x8/side","Sit-ups 3x15","Dead hang 3x20s"]},
  5:{m:["Rest or 15min walk"],b:false,g:["CONDITIONING: 6 rounds x 3min — row sprints / shadowbox alternating, 1min rest. LOG ROUNDS in Rounds tab."]},
  6:{m:["Rest"],b:false,g:["Leg press explosive 4x5","Shoulder press 3x5","Cable chop power 3x8/side","Assisted dip 3x8","Back extension 3x12","Treadmill Zone 2 30min (125-145bpm)"]},
  0:{m:["FULL REST. Check-in."],b:false,g:[]}}},
 2:{label:"WEEK 2 · BUILD",days:{
  1:{m:MORNING,b:true,g:["Leg press 4x8 heavier","Seated leg curl 4x10","Leg extension 4x10","Calf raise 3x12","Box jump 4x3","Plank 3x40s"]},
  2:{m:MORNING,b:true,g:["Chest press 4x6","Lat pulldown 4x6","Seated cable row 4x8","Cable chops 3x8/side both dir","External rotation 2x15/side"]},
  3:{m:["Jump rope 8x1min","Agility 10min","Push-ups 3x max-2"],b:true,g:["Rowing intervals 8x1min hard/1min easy","Back extension 3x12","Core circuit 10min"]},
  4:{m:MORNING,b:true,g:["Shoulder press 4x6","Assisted pull-up 4x8","Rear delt fly 2x15","Cable chops 3x8/side","Sit-ups 3x20","Dead hang 3x25s"]},
  5:{m:["Rest"],b:false,g:["CONDITIONING: 8 rounds x 3min. LOG IT."]},
  6:{m:["Rest"],b:false,g:["Leg press explosive 4x5","Shoulder press 3x5","Cable chop power 3x8/side","Assisted dip 3x8","Treadmill tempo 25min + 6x15s incline sprint"]},
  0:{m:["FULL REST. Check-in."],b:false,g:[]}}},
 3:{label:"WEEK 3 · PEAK",days:{
  1:{m:MORNING,b:true,g:["Leg press 3x6 +5-10%","Leg curl 3x8 heavy","Calf raise 3x10 heavy","Box jump 4x3 max intent","Plank 3x45s"]},
  2:{m:MORNING,b:true,g:["Chest press 3x5 heavy","Lat pulldown 3x5 heavy","Cable row 3x6","Cable chops FAST 3x8/side","External rotation 2x15"]},
  3:{m:["Jump rope 6x1min max speed","Push-ups 3x max"],b:true,g:["Rowing 6x40s ALL-OUT / 90s easy","Core 10min"]},
  4:{m:MORNING,b:true,g:["Shoulder press 3x5 heavy","Assisted pull-up 3x6 less assist","Cable chops 3x8/side","Sit-ups 3x20","Dead hang 3x30s"]},
  5:{m:["Rest"],b:false,g:["PEAK TEST: 10 rounds x 3min. Hardest session of camp. LOG IT."]},
  6:{m:["Rest"],b:false,g:["Explosive only: leg press speed 3x3, cable chop power 2x6/side","Treadmill incline sprints 8x15s ONLY"]},
  0:{m:["REST + optional easy pool 15-20min. Check-in."],b:false,g:[]}}},
 4:{label:"WEEK 4 · FIGHT WEEK",days:{
  1:{m:["10min mobility only"],b:true,g:["Activation only: 2 sets @60% — leg press, chest press, cable chop. Out in 20min."]},
  2:{m:["Rest or 15min mobility"],b:true,g:[]},
  3:{m:["No AM"],b:true,g:[]},
  4:{m:["Jump rope + shadowbox 20min total. Speed only."],b:false,g:[]},
  5:{m:["FULL REST. Mobility 15min. Sleep 9+."],b:false,g:[]},
  6:{m:["Weigh-in/prep day: hydrate, 10min shadowbox, visualization, early sleep"],b:false,g:[]},
  0:{m:["FIGHT DAY 🥊 Eat 3.5h out: chicken+rice+banana. Arrive -2h. Warm-up -1h: rope 5min, dynamic 5min, shadowbox 10min, pads 10min. Visualize. Go."],b:false,g:[]}}}
};

function weekDayOf(n){
  const diff=Math.floor((n-CAMP_START)/864e5);
  let week = diff<0 ? 0 : Math.min(4,Math.floor(diff/7)+1);
  return {week,dow:n.getDay()};
}
function weekDay(){ return weekDayOf(new Date(today()+"T00:00:00")); }
const daysToFight=()=>Math.max(0,Math.round((FIGHT-new Date(today()+"T00:00:00"))/864e5));
const CJ_START="2026-07-13"; // coach-workout scoring starts here; older days keep old ids so history/streaks are untouched
function dayItemIds(dd,key){
  const ids=[];
  dd.m.forEach((_,i)=>ids.push("m"+i));
  if(dd.b) ids.push("box");
  if(key&&key>=CJ_START){
    const cj=(D.coach||{})[key];
    if(cj&&cj.length)cj.forEach((_,i)=>ids.push("cj"+i)); else ids.push("cjdone");
  }else{
    dd.g.forEach((_,i)=>ids.push("g"+i));
  }
  return ids;
}

// ============== STREAKS ==============
function streaks(){
  const day0=new Date(today()+"T00:00:00");
  let proteinStreak=0, checklistStreak=0, checkingP=true, checkingC=true;
  for(let i=1;i<120;i++){
    const d=new Date(day0); d.setDate(d.getDate()-i);
    const key=fmtDate(d);
    const meals=D.meals[key]||[];
    const pro=meals.reduce((s,m)=>s+m.p*m.x,0);
    if(checkingP){ if(pro>=PRO_T) proteinStreak++; else checkingP=false; }
    const {week,dow}=weekDayOf(d);
    const dd=PLAN[week].days[dow];
    const ids=dayItemIds(dd,key);
    const done=D.done[key]||[];
    const allDone = ids.length===0 || ids.every(id=>done.includes(id));
    if(checkingC){ if(allDone) checklistStreak++; else checkingC=false; }
    if(!checkingP && !checkingC) break;
  }
  const tMeals=D.meals[today()]||[];
  const tPro=tMeals.reduce((s,m)=>s+m.p*m.x,0);
  if(tPro>=PRO_T) proteinStreak++;
  const {week:tw,dow:td}=weekDay();
  const tdd=PLAN[tw].days[td];
  const tids=dayItemIds(tdd,today());
  const tdone=D.done[today()]||[];

function ring(val,tgt,label,unit,color){
  const r=48,c=2*Math.PI*r,pct=Math.min(1,val/tgt);
  const over=val>tgt*1.15;
  return `<div style="text-align:center"><svg width="120" height="120" viewBox="0 0 128 128">
    <circle cx="64" cy="64" r="${r}" fill="none" stroke="#E8E2D6" stroke-width="11"/>
    <circle cx="64" cy="64" r="${r}" fill="none" stroke="${over?'var(--gold)':color}" stroke-width="11" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct)}" transform="rotate(-90 64 64)" style="transition:stroke-dashoffset .5s"/>
    <text x="64" y="60" text-anchor="middle" font-family="Georgia" font-size="22" font-weight="700" fill="var(--navy)">${Math.round(val)}</text>
    <text x="64" y="78" text-anchor="middle" font-size="10" fill="var(--muted)">/ ${tgt} ${unit}</text></svg>
    <div style="font-size:11px;letter-spacing:1.5px;color:var(--muted);font-weight:700">${label}</div></div>`;
}

  const chk=(id,txt)=>`<label class="item ${done.includes(id)?'done':''}" onclick="toggle('${id}');event.preventDefault()"><input type="checkbox" ${done.includes(id)?'checked':''}><span>${txt}</span></label>`;

}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function genWorkout(){
  const {week,dow}=weekDay();
  const P=POOLS[WO.loc];
  let budget=WO.mins;
  const blocks=[];
  let focus=FOCUS_BY_DOW[dow];
  let notes=[];
  const fightWeek = week===4;
  const isAM = WO.tod==="AM";

  if(fightWeek){
    budget=Math.min(budget,25);
    notes.push("FIGHT WEEK: volume capped at 25 min. Sharpness only, nothing that makes you sore.");
  }
  if(isAM && !fightWeek){
    notes.push("AM session — deliberately light. Hard work happens at boxing and evening gym. This primes, it doesn't drain.");
  }

  const warmBudget = budget>=35?8:5;
  let warm=[],wm=0;
  for(const e of P.warm){ if(wm+e.m<=warmBudget){warm.push(e);wm+=e.m;} }
  blocks.push({title:"WARM-UP",items:warm,mins:wm});
  budget-=wm;

  const coolBudget = budget>=25?6:(budget>=15?3:0);
  budget-=coolBudget;

  let main=[],mm=0;
  if(focus==="recovery" || (fightWeek&&dow!==1)){
    const pool=[...P.neck,{n:"Mobility flow",d:"hips, shoulders, ankles · 8 min",m:8,a:"stretch",c:["Slow circles through each joint","Follow tightness, spend time there","No forcing"],x:"Rushing through it — this IS the workout today."},{n:"Easy shadowbox",d:"technique only · 5 min",m:5,a:"punch",c:["50% speed","Perfect guard returns","Footwork focus"],x:"Sneaking in hard rounds on a recovery day."},{n:"Breathing",d:"4s in / 6s out, lying down · 4 min",m:4,a:"stretch",c:["In through nose 4s","Out through mouth 6s","Let everything sink into the floor"],x:"Scrolling your phone during it."}];
    for(const e of pool){ if(mm+e.m<=budget){main.push(e);mm+=e.m;} }
    blocks.push({title:"RECOVERY WORK",items:main,mins:mm});
  } else if(isAM){
    const pool=[...P.neck,...shuffle(P.core).slice(0,2),{n:"Jump rope easy",d:"3x2min",m:6,a:"rope",c:["Light bounces, find flow","Practice crossovers if fresh","Shoulders loose"],x:"Turning it into conditioning — save it for PM."},{n:"Mobility flow",d:"5 min",m:5,a:"stretch",c:["Hips, shoulders, ankles","Move slow through full ranges","Breathe"],x:"Skipping it to sleep 5 more minutes."}];
    for(const e of pool){ if(mm+e.m<=budget){main.push(e);mm+=e.m;} }
    blocks.push({title:"AM PRIMER · "+FOCUS_LABEL[focus],items:main,mins:mm});
  } else {
    if(focus==="engine"){
      const iv=shuffle(P.engine.filter(e=>e.rep))[0];
      let rounds=Math.max(4,Math.floor((budget*0.65)/iv.m));
      if(week>=3)rounds=Math.min(rounds+2,12);
      const ivMins=rounds*iv.m;
      main.push({...iv,n:iv.n,d:`${rounds} rounds · ${iv.d}`,m:ivMins});
      mm+=ivMins;
      for(const e of shuffle(P.core)){ if(mm+e.m<=budget){main.push(e);mm+=e.m;break;} }
      blocks.push({title:"ENGINE · "+FOCUS_LABEL[focus],items:main,mins:mm});
    } else {
      const pool=shuffle(P[focus]);
      for(const e of pool){ if(mm+e.m<=budget*0.8){main.push(e);mm+=e.m;} }
      blocks.push({title:"MAIN · "+FOCUS_LABEL[focus],items:main,mins:mm});
      let fin=[],fm=0;
      for(const e of shuffle(P.core)){ if(fm+e.m<=budget-mm){fin.push(e);fm+=e.m;} if(fin.length>=2)break; }
      if(fin.length){blocks.push({title:"CORE FINISHER",items:fin,mins:fm});mm+=fm;}
    }
  }
  budget-=mm;

  if(coolBudget){
    let cool=[],cm=0;
    for(const e of P.cool){ if(cm+e.m<=coolBudget+budget){cool.push(e);cm+=e.m;} }
    blocks.push({title:"COOL-DOWN",items:cool,mins:cm});
  }
  const total=blocks.reduce((s,b)=>s+b.mins,0);
  return {blocks,total,notes,focus,week};
}

          <div class="mst">✕ ${it.x||"Rushing reps with bad form."}</div></div>
        </div></div>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`<div class="muted" style="margin-top:12px">Effort guide: work sets around RPE ${w.week>=3?'7-8':'6-7'} this week. If anything hurts (not burns — hurts), skip it and tell your coach.</div></div>`;
  el.innerHTML=h;
}

function rpeAssessment(rpes,dtf,week){
  const avg=rpes.reduce((a,b)=>a+b,0)/rpes.length;
  let target=[6,8],ctx="conditioning day";
  if(week>=3){target=[7,9];ctx="peak-phase conditioning";}
  if(week<=1){target=[5,7];ctx="base-phase conditioning";}
  let verdict,note;
  if(avg<target[0]-1){verdict="UNDERTRAINED";note="Effort was low for this phase. If you felt fine and just cruised, push harder next session. If you were flat/tired, check sleep and recovery trends.";}
  else if(avg>target[1]+1){verdict="OVERREACHED";note="That's a hard session, higher than target for "+ctx+". Fine occasionally, but if avg RPE keeps running this high, back off volume or you're heading toward burnout/injury.";}
  else if(avg>=target[0]&&avg<=target[1]){verdict="ON TARGET";note="Right in the zone for "+ctx+". This is the intensity that builds fitness without wrecking recovery.";}
  else{verdict=avg<target[0]?"SLIGHTLY LOW":"SLIGHTLY HIGH";note="Close to target range for "+ctx+", not a concern on its own.";}
  return {avg,verdict,note,target};
}

function rolling(field,days=7){
  const vals=D.weekly.filter(r=>r[field]!==""&&r[field]!=null).slice(-days).map(r=>+r[field]).filter(v=>!isNaN(v)&&v>0);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}
function weightChart(){
  const pts=D.weekly.filter(r=>+r.weight>0).map(r=>({d:r.date,w:+r.weight}));
  if(pts.length<2)return `<div class="muted">Log 2+ weights to see your trend.</div>`;
  const roll=pts.map((p,i)=>{
    const win=pts.slice(Math.max(0,i-2),i+1);
    return win.reduce((s,x)=>s+x.w,0)/win.length;
  });
  const w=340,h=100,allVals=[...pts.map(p=>p.w),...roll],min=Math.min(...allVals)-1,max=Math.max(...allVals)+1;
  const x=i=>28+(w-38)*i/(pts.length-1),y=v=>h-16-(h-28)*(v-min)/((max-min)||1);
  const path=pts.map((p,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(p.w).toFixed(1)}`).join(" ");
  const rollPath=roll.map((v,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const daysSpan=(new Date(pts[pts.length-1].d)-new Date(pts[0].d))/864e5;
  const totalChange=pts[pts.length-1].w-pts[0].w;
  const perWeek = daysSpan>0 ? (totalChange/daysSpan)*7 : 0;
  let rateWarn="";
  if(Math.abs(perWeek)>=1.5){
    rateWarn=`<div class="warn card" style="margin-top:8px;padding:10px">⚠️ ${perWeek<0?"Losing":"Gaining"} ${Math.abs(perWeek).toFixed(1)} lb/week. Over 1.5 lb/week ${perWeek<0?"loss usually means muscle loss, not just fat":"gain is likely water/fat, not lean mass"} mid-camp. ${perWeek<0?"Eat more, especially post-boxing.":"Check if it's water retention vs actual gain."}</div>`;
  }
  return `<svg viewBox="0 0 ${w} ${h+18}" style="width:100%;max-width:440px">
    <path d="${path}" fill="none" stroke="var(--red)" stroke-width="2"/>
    <path d="${rollPath}" fill="none" stroke="var(--navy)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
    ${pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.w).toFixed(1)}" r="2.5" fill="var(--navy)"/>`).join("")}
    <text x="2" y="14" font-size="9" fill="#888">${max.toFixed(0)}</text>
    <text x="2" y="${h-6}" font-size="9" fill="#888">${min.toFixed(0)}</text></svg>
  <div class="muted">${pts[0].w} lb (${pts[0].d.slice(5)}) → ${pts[pts.length-1].w} lb (${pts[pts.length-1].d.slice(5)}) · ${perWeek>=0?"+":""}${perWeek.toFixed(1)} lb/week · dashed line = 3-log rolling avg</div>
  ${rateWarn}`;
}
function trendCard(){
  const rAvg=rolling("rhr"),hAvg=rolling("hrv"),last=D.weekly[D.weekly.length-1]||{};
  let t="";
  if(rAvg)t+=`<div>RHR 7-day avg: <b>${rAvg.toFixed(0)} bpm</b>${last.rhr?` · latest ${last.rhr}`:""}</div>`;
  if(hAvg)t+=`<div>HRV 7-day avg: <b>${hAvg.toFixed(0)} ms</b>${last.hrv?` · latest ${last.hrv}`:""}</div>`;
  if(rAvg&&last.rhr&&+last.rhr>=rAvg+5)t+=`<div class="warn card" style="margin-top:6px;padding:8px">⚠️ RHR 5+ over average — recovery flag</div>`;
  if(hAvg&&last.hrv&&+last.hrv<=hAvg*0.8)t+=`<div class="warn card" style="margin-top:6px;padding:8px">⚠️ HRV 20%+ below average — go light today</div>`;
  if(!t)t=`<div class="muted">Averages appear after a few check-ins. One bad night won't trigger alarms — trends will.</div>`;
  return t;
}

function parseCoach(raw){
  const items=[];let prefix="";
  for(let line of raw.split("\n")){
    line=line.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu,"").replace(/^[\s\-•*·>]+/,"").trim();
    if(!line)continue;
    // split multi-exercise lines: commas, "then", ";", " + "
    for(let seg of line.split(/,|;| then | \+ /i)){
      seg=seg.trim().replace(/^then\s+/i,"").replace(/[:.]$/,"");
      if(seg.length<2)continue;
      // standalone header like "3 sets", "4 rounds", "3 sets of" -> applies to following items
      if(/^\d+\s*(sets?|rounds?)(\s+of)?$/i.test(seg)){ prefix=seg.toLowerCase(); continue; }
      // standalone section label like "warm up" (no digits) ending the original line with ":"
      if(!/\d/.test(seg)&&/:\s*$/.test(line)){ prefix=seg.toLowerCase(); continue; }
      items.push(prefix?prefix+" · "+seg:seg);
    }
  }
  return items;
}

// ================= BARCODE SCANNING (ZXing — works in Safari + installed app) =================
let zxLoad=null,zxReader=null;
function loadZX(){
  if(window.ZXing)return Promise.resolve();
  if(zxLoad)return zxLoad;
  zxLoad=new Promise((ok,err)=>{const sc=document.createElement("script");
    sc.src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js";
    sc.onload=ok;sc.onerror=()=>{zxLoad=null;err(new Error("Couldn't load scanner — check internet"));};
    document.head.appendChild(sc);});
  return zxLoad;
}
function stopScan(){ try{if(zxReader)zxReader.reset();}catch(e){} zxReader=null; const a=document.getElementById("scanArea"); if(a)a.innerHTML=""; }
async function startScan(){
  const area=document.getElementById("scanArea");
  area.innerHTML=`<div class="muted">Loading scanner…</div>`;
  try{
    await loadZX();
    area.innerHTML=`<video id="scanVid" style="width:100%;max-width:380px;border:2px solid var(--navy);border-radius:6px" autoplay playsinline muted></video><br><button class="btn ghost sm" style="margin-top:6px" onclick="stopScan()">Stop</button>`;
    zxReader=new ZXing.BrowserMultiFormatReader();
    await zxReader.decodeFromConstraints({video:{facingMode:"environment"}},document.getElementById("scanVid"),(res)=>{ if(res){stopScan();lookupBarcode(res.getText());} });
  }catch(e){ stopScan(); alert("Camera blocked or unavailable ("+e.message+"). Use From Photo instead."); }
}
async function scanFromFile(inp){
  const file=inp.files[0];if(!file)return;inp.value="";
  const res=document.getElementById("scanResult");
  res.innerHTML=`<div class="muted" style="margin-top:8px">Reading barcode…</div>`;
  try{
    await loadZX();
    const r=await new ZXing.BrowserMultiFormatReader().decodeFromImageUrl(URL.createObjectURL(file));
    res.innerHTML="";lookupBarcode(r.getText());
  }catch(e){ res.innerHTML=`<div class="warn card" style="margin-top:8px">No barcode found in that photo. Get closer, barcode flat, good light.</div>`; }
}
async function lookupBarcode(code){
  const res=document.getElementById("scanResult");
  res.innerHTML=`<div class="muted" style="margin-top:8px">Looking up ${code}…</div>`;
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`);
    const j=await r.json();
    if(j.status!==1)return res.innerHTML=`<div class="warn card" style="margin-top:8px">Barcode ${code} not in Open Food Facts. Add it manually from the label below — takes 20 seconds.</div>`;
    const p=j.product,nut=p.nutriments||{};
    const name=p.product_name||"Unknown product";
    let k=nut["energy-kcal_serving"],pr=nut["proteins_serving"],basis="per serving";
    if(k==null){
      k=nut["energy-kcal_100g"];pr=nut["proteins_100g"];basis="per 100g";
      const grams=parseFloat(prompt(`"${name}" only has per-100g data (${Math.round(k||0)} kcal / ${Math.round(pr||0)}g P per 100g).\nHow many grams is YOUR serving? (check label)`,"100"));
      if(!grams)return res.innerHTML="";
      k=k*grams/100;pr=(pr||0)*grams/100;basis=grams+"g serving";
    }
    if(k==null)return res.innerHTML=`<div class="warn card" style="margin-top:8px">Product found but no nutrition data. Enter from label manually.</div>`;
    k=Math.round(k);pr=Math.round(pr||0);
    res.innerHTML=`<div class="card" style="border-left:6px solid var(--red);margin-top:8px">
      <b>${name}</b><br>${k} kcal · ${pr}g protein (${basis})<br>
      <button class="btn sm" style="margin-top:8px" onclick='saveScanned(${JSON.stringify(name)},${k},${pr},true)'>Log Now + Save to List</button>
      <button class="btn ghost sm" style="margin-top:8px" onclick='saveScanned(${JSON.stringify(name)},${k},${pr},false)'>Save to List Only</button></div>`;
  }catch(e){res.innerHTML=`<div class="warn card" style="margin-top:8px">Lookup failed — offline? Try again or enter manually.</div>`;}
}
function saveScanned(n,k,p,logNow){
  if(!D.customFoods.some(f=>f.n===n))D.customFoods.push({n,k,p});
  if(logNow){
    const t=today();D.meals[t]=D.meals[t]||[];
    D.meals[t].push({n,k,p,x:1,t:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})});
  }
  save();renderFood();renderToday();
}
